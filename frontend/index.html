<!doctype html>
<html lang="es">

    <!-- ── Viewport ─────────────────────────────────────────────────────── -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Identidad ────────────────────────────────────────────────────── -->
    <title>SIS-AGRO</title>

          content="Sistema de Gestión Agropecuaria — Ventas, Inventario, Caja y Reportes" />

    <link rel="icon" type="image/png" href="/logo.png" />
